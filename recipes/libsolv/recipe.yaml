context:
  version: "0.7.31"
  target: "x86_64-pc-freebsd14.4"
  sysroot: ${{ env.SYSROOT | default("/opt/freebsd-sysroot/x86_64-pc-freebsd14.4") }}

package:
  name: libsolv
  version: ${{ version }}

source:
  url: https://github.com/openSUSE/libsolv/archive/refs/tags/${{ version }}.tar.gz

build:
  number: 0
  dynamic_linking:
    binary_relocation: false
  script:
    - mkdir build && cd build
    - >
      cmake ..
      -GNinja
      -DCMAKE_BUILD_TYPE=Release
      -DCMAKE_INSTALL_PREFIX=$PREFIX
      -DCMAKE_C_COMPILER=clang
      -DCMAKE_CXX_COMPILER=clang++
      -DCMAKE_C_COMPILER_TARGET=${{ target }}
      -DCMAKE_CXX_COMPILER_TARGET=${{ target }}
      -DCMAKE_SYSROOT=${{ sysroot }}
      -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld"
      -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld"
      -DENABLE_CONDA=ON
      -DENABLE_ZSTD_COMPRESSION=ON
      -DENABLE_BZIP2_COMPRESSION=ON
      -DENABLE_ZLIB_COMPRESSION=ON
      -DWITH_LIBXML2=OFF
      -DDISABLE_SHARED=OFF
      -DENABLE_STATIC=OFF
    - ninja install
    - test -f $PREFIX/include/solv/conda.h || (echo "MISSING conda.h" && exit 1)
    - test -f $PREFIX/include/solv/repo_conda.h || (echo "MISSING repo_conda.h" && exit 1)
    - echo "libsolv conda headers OK"

about:
  homepage: https://github.com/openSUSE/libsolv
  license: BSD-2-Clause
  summary: Library for package dependency solving with Conda support (freebsd-64)
