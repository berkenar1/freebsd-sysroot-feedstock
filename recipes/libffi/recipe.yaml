context:
  version: "3.4.4"
  target: "x86_64-pc-freebsd14.4"
  sysroot: ${{ env.SYSROOT | default("/opt/freebsd-sysroot/x86_64-pc-freebsd14.4") }}

package:
  name: libffi
  version: ${{ version }}

source:
  url: https://github.com/libffi/libffi/releases/download/v${{ version }}/libffi-${{ version }}.tar.gz

build:
  number: 0
  dynamic_linking:
    binary_relocation: false
  script:
    - export CC="clang -target ${{ target }} --sysroot=${{ sysroot }}"
    - export CXX="clang++ -target ${{ target }} --sysroot=${{ sysroot }}"
    - export AR="llvm-ar"
    - export LD="ld.lld"
    - ./configure --prefix=$PREFIX --host=${{ target }} --disable-static --enable-shared
    - make -j${{ CPU_COUNT }}
    - make install

about:
  homepage: https://sourceware.org/libffi/
  license: MIT
  summary: A portable foreign-function interface library (freebsd-64 cross-compiled)
