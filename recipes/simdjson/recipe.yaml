context:
  version: "3.9.4"
  target: "x86_64-pc-freebsd14.4"
  sysroot: ${{ env.SYSROOT | default("/opt/freebsd-sysroot/x86_64-pc-freebsd14.4") }}

package:
  name: simdjson
  version: ${{ version }}

source:
  url: https://github.com/simdjson/simdjson/archive/refs/tags/v${{ version }}.tar.gz

build:
  number: 0
  dynamic_linking:
    binary_relocation: false
  script:
    - mkdir build && cd build
    - >
      cmake ..
      -GNinja
      -DCMAKE_BUILD_TYPE=Release
      -DCMAKE_INSTALL_PREFIX=$PREFIX
      -DCMAKE_C_COMPILER=clang
      -DCMAKE_CXX_COMPILER=clang++
      -DCMAKE_C_COMPILER_TARGET=${{ target }}
      -DCMAKE_CXX_COMPILER_TARGET=${{ target }}
      -DCMAKE_SYSROOT=${{ sysroot }}
      -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld"
      -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld"
      -DSIMDJSON_BUILD_STATIC=OFF
      -DSIMDJSON_JUST_LIBRARY=ON
    - ninja install

about:
  homepage: https://simdjson.org
  license: Apache-2.0
  summary: Parsing gigabytes of JSON per second (freebsd-64 cross-compiled)
