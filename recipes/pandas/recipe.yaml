context:
  version: "2.2.2"
  target: "x86_64-pc-freebsd14.4"
  sysroot: ${{ env.SYSROOT | default("/opt/freebsd-sysroot/x86_64-pc-freebsd14.4") }}

package:
  name: pandas
  version: ${{ version }}

source:
  url: https://github.com/pandas-dev/pandas/releases/download/v${{ version }}/pandas-${{ version }}.tar.gz

build:
  number: 0
  dynamic_linking:
    binary_relocation: false
  script:
    - export CC="clang -target ${{ target }} --sysroot=${{ sysroot }} -fPIC"
    - export CXX="clang++ -target ${{ target }} --sysroot=${{ sysroot }} -fPIC"
    - export AR="llvm-ar"
    - export LD="ld.lld"
    - export RANLIB="llvm-ranlib"
    - export PKG_CONFIG_LIBDIR=$PREFIX/lib/pkgconfig:$PREFIX/share/pkgconfig
    - export PKG_CONFIG_PATH=""
    - >
      python -m pip install .
      --no-deps
      --no-build-isolation
      --ignore-installed
      -v
      --prefix=$PREFIX

requirements:
  build:
    - python
    - pip
    - wheel
    - meson-python
    - cython
    - pkg-config
  host:
    - python
    - numpy
    - openblas
  run:
    - python
    - numpy
    - openblas

about:
  homepage: https://pandas.pydata.org
  license: BSD-3-Clause
  summary: Powerful data structures for data analysis, time series, and statistics (freebsd-64 cross-compiled)
