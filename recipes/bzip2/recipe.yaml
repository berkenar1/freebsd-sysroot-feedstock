context:
  version: "1.0.8"
  target: "x86_64-pc-freebsd14.4"
  sysroot: ${{ env.SYSROOT | default("/opt/freebsd-sysroot/x86_64-pc-freebsd14.4") }}

package:
  name: bzip2
  version: ${{ version }}

source:
  url: https://sourceware.org/pub/bzip2/bzip2-${{ version }}.tar.gz

build:
  number: 0
  dynamic_linking:
    binary_relocation: false
  script:
    - export CC="clang -target ${{ target }} --sysroot=${{ sysroot }} -fPIC"
    - export AR="llvm-ar"
    - export RANLIB="llvm-ranlib"
    # Build shared library first using the provided Makefile for shared libs
    - make -f Makefile-libbz2_so CC="$CC" AR="$AR" RANLIB="$RANLIB"
    # Build static and utilities, install
    - make install PREFIX=$PREFIX CC="$CC" AR="$AR" RANLIB="$RANLIB"
    # Copy shared libraries and set up symlinks
    - cp -d libbz2.so* $PREFIX/lib/ || cp -a libbz2.so* $PREFIX/lib/
    - ln -sf libbz2.so.${{ version }} $PREFIX/lib/libbz2.so
    - ln -sf libbz2.so.${{ version }} $PREFIX/lib/libbz2.so.1.0
    - ln -sf libbz2.so.${{ version }} $PREFIX/lib/libbz2.so.1

about:
  homepage: https://sourceware.org/bzip2/
  license: BSD-3-Clause
  summary: High-quality data compressor (freebsd-64 cross-compiled)
