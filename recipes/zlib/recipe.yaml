context:
  version: "1.3.1"
  target: "x86_64-pc-freebsd14.4"
  sysroot: ${{ env.SYSROOT | default("/opt/freebsd-sysroot/x86_64-pc-freebsd14.4") }}

package:
  name: zlib
  version: ${{ version }}

source:
  url: https://github.com/madler/zlib/archive/refs/tags/v${{ version }}.tar.gz

build:
  number: 0
  dynamic_linking:
    binary_relocation: false
  script:
    - export CC="clang -target ${{ target }} --sysroot=${{ sysroot }}"
    - ./configure --prefix=$PREFIX
    - make -j${{ CPU_COUNT }}
    - make install

about:
  homepage: https://zlib.net
  license: Zlib
  summary: A mass-collaborative utility data compression library (freebsd-64 cross-compiled)
