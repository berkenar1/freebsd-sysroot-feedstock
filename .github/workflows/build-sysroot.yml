name: Build FreeBSD Sysroot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-sysroot:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['14.4', '15.0']
    steps:
      - uses: actions/checkout@v4

      - name: Download FreeBSD base
        run: |
          curl -L -o base.txz \
            "https://download.freebsd.org/releases/amd64/${{ matrix.version }}-RELEASE/base.txz"

      - name: Extract sysroot
        run: |
          mkdir -p sysroot/x86_64-pc-freebsd${{ matrix.version }}
          tar -C sysroot/x86_64-pc-freebsd${{ matrix.version }} -xf base.txz \
            ./usr/include ./usr/lib ./usr/libdata ./lib ./libexec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysroot-freebsd-${{ matrix.version }}
          path: sysroot/
