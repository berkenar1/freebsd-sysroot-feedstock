name: Build FreeBSD Sysroot

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-sysroot:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['14.4', '15.0']
    steps:
      - uses: actions/checkout@v4

      - name: Download FreeBSD base.txz
        run: |
          curl -fL -o base.txz \
            "https://download.freebsd.org/releases/amd64/${{ matrix.version }}-RELEASE/base.txz"
          ls -lh base.txz

      - name: Extract sysroot
        run: |
          V="${{ matrix.version }}"
          mkdir -p sysroot
          tar -C sysroot -xf base.txz \
            ./usr/include \
            ./usr/lib \
            ./usr/libdata \
            ./lib \
            ./libexec

      - name: Verify sysroot structure
        run: |
          SYSROOT="sysroot"
          echo "Checking required directories..."
          for dir in usr/include usr/lib usr/libdata lib libexec; do
            test -d "$SYSROOT/$dir" || (echo "MISSING: $dir" && exit 1)
          done
          echo "Checking essential C headers..."
          for hdr in stdio.h stdlib.h string.h stdint.h stddef.h \
                     sys/types.h sys/stat.h sys/socket.h \
                     unistd.h fcntl.h errno.h; do
            test -f "$SYSROOT/usr/include/$hdr" \
              || (echo "MISSING header: $hdr" && exit 1)
          done
          echo "Checking essential libraries..."
          for lib in libc.so libm.so libpthread.so; do
            test -f "$SYSROOT/usr/lib/$lib" \
              || (echo "MISSING library: $lib" && exit 1)
          done
          echo "Checking C++ headers..."
          test -d "$SYSROOT/usr/include/c++" \
            || (echo "MISSING: C++ include directory" && exit 1)
          echo "All checks passed."

      - name: Package sysroot as tarball
        run: |
          V="${{ matrix.version }}"
          mkdir -p pkg/x86_64-pc-freebsd${V}
          cp -R sysroot/* pkg/x86_64-pc-freebsd${V}/
          tar -C pkg -cjf sysroot_freebsd-64-${V}.tar.bz2 x86_64-pc-freebsd${V}/
          ls -lh sysroot_freebsd-64-${V}.tar.bz2

      - name: Upload sysroot artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysroot-${{ matrix.version }}
          path: sysroot_freebsd-64-${{ matrix.version }}.tar.bz2

  test-cross-compile:
    needs: build-sysroot
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['14.4', '15.0']
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sysroot-${{ matrix.version }}
          path: sysroot-pkg/

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm file

      - name: Extract sysroot
        run: |
          V="${{ matrix.version }}"
          mkdir -p /opt/freebsd-sysroot
          tar -C /opt/freebsd-sysroot -xjf sysroot-pkg/sysroot_freebsd-64-${V}.tar.bz2
          echo "Sysroot contents:"
          ls /opt/freebsd-sysroot/

      - name: Test C cross-compilation
        run: |
          V="${{ matrix.version }}"
          cat > hello.c << 'CEOF'
          #include <stdio.h>
          int main() { printf("Hello FreeBSD\n"); return 0; }
          CEOF

          clang -target x86_64-pc-freebsd${V} \
            --sysroot=/opt/freebsd-sysroot/x86_64-pc-freebsd${V} \
            -fuse-ld=lld \
            hello.c -o hello-freebsd

          file hello-freebsd
          file hello-freebsd | grep -qi "freebsd" \
            || (echo "ERROR: not a FreeBSD ELF" && exit 1)
          echo "C cross-compilation: PASSED"

      - name: Test C with math library
        run: |
          V="${{ matrix.version }}"
          cat > math_test.c << 'CEOF'
          #include <stdio.h>
          #include <math.h>
          int main() { printf("sqrt(2)=%f\n", sqrt(2.0)); return 0; }
          CEOF

          clang -target x86_64-pc-freebsd${V} \
            --sysroot=/opt/freebsd-sysroot/x86_64-pc-freebsd${V} \
            -fuse-ld=lld \
            math_test.c -o math-freebsd -lm

          file math-freebsd | grep -qi "freebsd" \
            || (echo "ERROR: not a FreeBSD ELF" && exit 1)
          echo "C with -lm: PASSED"

      - name: Test C with pthreads
        run: |
          V="${{ matrix.version }}"
          cat > thread_test.c << 'CEOF'
          #include <stdio.h>
          #include <pthread.h>
          void *worker(void *arg) { return NULL; }
          int main() {
            pthread_t t;
            pthread_create(&t, NULL, worker, NULL);
            pthread_join(t, NULL);
            printf("pthread OK\n");
            return 0;
          }
          CEOF

          clang -target x86_64-pc-freebsd${V} \
            --sysroot=/opt/freebsd-sysroot/x86_64-pc-freebsd${V} \
            -fuse-ld=lld \
            thread_test.c -o thread-freebsd -lpthread

          file thread-freebsd | grep -qi "freebsd" \
            || (echo "ERROR: not a FreeBSD ELF" && exit 1)
          echo "C with -lpthread: PASSED"

      - name: Test C++ cross-compilation
        run: |
          V="${{ matrix.version }}"
          cat > hello.cpp << 'CEOF'
          #include <iostream>
          #include <string>
          int main() {
            std::string msg = "Hello FreeBSD C++";
            std::cout << msg << std::endl;
            return 0;
          }
          CEOF

          clang++ -target x86_64-pc-freebsd${V} \
            --sysroot=/opt/freebsd-sysroot/x86_64-pc-freebsd${V} \
            -fuse-ld=lld \
            hello.cpp -o hello-freebsd-cpp

          file hello-freebsd-cpp | grep -qi "freebsd" \
            || (echo "ERROR: C++ binary not a FreeBSD ELF" && exit 1)
          echo "C++ cross-compilation: PASSED"
