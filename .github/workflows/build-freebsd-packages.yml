name: Build FreeBSD-64 Conda Packages

on:
  workflow_run:
    workflows: ["Build FreeBSD Sysroot"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      fbsd_version:
        description: 'FreeBSD version to target'
        required: false
        default: '14.4'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RATTLER_BUILD_VERSION: "0.64.1"
  FBSD_VERSION: "14.4"
  TARGET: "x86_64-pc-freebsd14.4"
  SYSROOT: "/opt/freebsd-sysroot/x86_64-pc-freebsd14.4"

jobs:
  # ──────────────────────────────────────────────
  # 0. Setup: download sysroot, install toolchain
  # ──────────────────────────────────────────────
  setup-env:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      sysroot_ready: ${{ steps.verify.outputs.ok }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sysroot-${{ env.FBSD_VERSION }}
          path: sysroot-pkg/
        continue-on-error: true

      # Fallback: rebuild sysroot inline if artifact expired
      - name: Rebuild sysroot if artifact missing
        run: |
          if [ ! -f sysroot-pkg/sysroot_freebsd-64-${FBSD_VERSION}.tar.bz2 ]; then
            echo "Artifact missing — rebuilding sysroot inline"
            curl -fL -o base.txz \
              "https://download.freebsd.org/releases/amd64/${FBSD_VERSION}-RELEASE/base.txz"
            mkdir -p sysroot
            tar -C sysroot -xf base.txz \
              ./usr/include ./usr/lib ./usr/libdata ./lib ./libexec
            mkdir -p sysroot-pkg/x86_64-pc-freebsd${FBSD_VERSION}
            cp -R sysroot/* sysroot-pkg/x86_64-pc-freebsd${FBSD_VERSION}/
            tar -C sysroot-pkg -cjf \
              sysroot-pkg/sysroot_freebsd-64-${FBSD_VERSION}.tar.bz2 \
              x86_64-pc-freebsd${FBSD_VERSION}/
          fi

      - name: Extract sysroot
        run: |
          mkdir -p ${SYSROOT}
          tar -C /opt/freebsd-sysroot \
            -xjf sysroot-pkg/sysroot_freebsd-64-${FBSD_VERSION}.tar.bz2

      - name: Install cross toolchain + build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang lld llvm cmake ninja-build \
            pkg-config file curl git \
            python3 python3-pip

      - name: Install rattler-build
        run: |
          curl -fsSL \
            "https://github.com/prefix-dev/rattler-build/releases/download/v${RATTLER_BUILD_VERSION}/rattler-build-x86_64-unknown-linux-musl" \
            -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build
          rattler-build --version

      - name: Verify sysroot
        id: verify
        run: |
          test -f ${SYSROOT}/usr/include/stdio.h \
            && echo "ok=true" >> $GITHUB_OUTPUT \
            || (echo "ok=false" >> $GITHUB_OUTPUT && exit 1)

      - name: Cache sysroot for downstream jobs
        uses: actions/cache/save@v4
        with:
          path: /opt/freebsd-sysroot
          key: freebsd-sysroot-${{ env.FBSD_VERSION }}-${{ github.run_id }}

  # ──────────────────────────────────────────────
  # 1. Leaf packages (no conda deps between them)
  # ──────────────────────────────────────────────
  build-fmt:
    needs: setup-env
    runs-on: ubuntu-latest
    env:
      PKG_VERSION: "10.2.1"
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang lld llvm cmake ninja-build curl
          curl -fsSL \
            "https://github.com/prefix-dev/rattler-build/releases/download/v${RATTLER_BUILD_VERSION}/rattler-build-x86_64-unknown-linux-musl" \
            -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build

      - name: Restore sysroot cache
        uses: actions/cache/restore@v4
        with:
          path: /opt/freebsd-sysroot
          key: freebsd-sysroot-${{ env.FBSD_VERSION }}-${{ github.run_id }}

      - name: Write recipe
        run: |
          mkdir -p recipe
          cat > recipe/recipe.yaml << 'EOF'
          context:
            version: "10.2.1"
            target: "x86_64-pc-freebsd14.4"
            sysroot: "/opt/freebsd-sysroot/x86_64-pc-freebsd14.4"

          package:
            name: fmt
            version: ${{ context.version }}

          source:
            url: https://github.com/fmtlib/fmt/archive/refs/tags/${{ context.version }}.tar.gz

          build:
            number: 0
            target_platform: freebsd-64
            script:
              - mkdir build && cd build
              - >
                cmake ..
                -GNinja
                -DCMAKE_BUILD_TYPE=Release
                -DCMAKE_INSTALL_PREFIX=$PREFIX
                -DCMAKE_C_COMPILER=clang
                -DCMAKE_CXX_COMPILER=clang++
                -DCMAKE_C_COMPILER_TARGET=${{ context.target }}
                -DCMAKE_CXX_COMPILER_TARGET=${{ context.target }}
                -DCMAKE_SYSROOT=${{ context.sysroot }}
                -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld"
                -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld"
                -DFMT_TEST=OFF
                -DFMT_DOC=OFF
                -DBUILD_SHARED_LIBS=ON
              - ninja install

          about:
            homepage: https://fmt.dev
            license: MIT
            summary: A modern formatting library (freebsd-64 cross-compiled)
          EOF

      - name: Build fmt
        run: |
          rattler-build build \
            --recipe recipe/recipe.yaml \
            --output-dir conda-bld \
            --target-platform freebsd-64

      - uses: actions/upload-artifact@v4
        with:
          name: conda-freebsd-fmt
          path: conda-bld/**/*.conda

  build-reproc:
    needs: setup-env
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang lld llvm cmake ninja-build curl
          curl -fsSL \
            "https://github.com/prefix-dev/rattler-build/releases/download/v${RATTLER_BUILD_VERSION}/rattler-build-x86_64-unknown-linux-musl" \
            -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build

      - name: Restore sysroot cache
        uses: actions/cache/restore@v4
        with:
          path: /opt/freebsd-sysroot
          key: freebsd-sysroot-${{ env.FBSD_VERSION }}-${{ github.run_id }}

      - name: Write recipe
        run: |
          mkdir -p recipe
          cat > recipe/recipe.yaml << 'EOF'
          context:
            version: "14.2.4"
            target: "x86_64-pc-freebsd14.4"
            sysroot: "/opt/freebsd-sysroot/x86_64-pc-freebsd14.4"

          package:
            name: reproc
            version: ${{ context.version }}

          source:
            url: https://github.com/DaanDeMeyer/reproc/archive/refs/tags/v${{ context.version }}.tar.gz

          build:
            number: 0
            target_platform: freebsd-64
            script:
              - mkdir build && cd build
              - >
                cmake ..
                -GNinja
                -DCMAKE_BUILD_TYPE=Release
                -DCMAKE_INSTALL_PREFIX=$PREFIX
                -DCMAKE_C_COMPILER=clang
                -DCMAKE_CXX_COMPILER=clang++
                -DCMAKE_C_COMPILER_TARGET=${{ context.target }}
                -DCMAKE_CXX_COMPILER_TARGET=${{ context.target }}
                -DCMAKE_SYSROOT=${{ context.sysroot }}
                -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld"
                -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld"
                -DREPROC++=ON
                -DBUILD_SHARED_LIBS=ON
                -DREPROC_TEST=OFF
                -DREPROC_EXAMPLES=OFF
              - ninja install

          about:
            homepage: https://github.com/DaanDeMeyer/reproc
            license: MIT
            summary: Process I/O library (freebsd-64 cross-compiled)
          EOF

      - name: Build reproc
        run: |
          rattler-build build \
            --recipe recipe/recipe.yaml \
            --output-dir conda-bld \
            --target-platform freebsd-64

      - uses: actions/upload-artifact@v4
        with:
          name: conda-freebsd-reproc
          path: conda-bld/**/*.conda

  build-yaml-cpp:
    needs: setup-env
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang lld llvm cmake ninja-build curl
          curl -fsSL \
            "https://github.com/prefix-dev/rattler-build/releases/download/v${RATTLER_BUILD_VERSION}/rattler-build-x86_64-unknown-linux-musl" \
            -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build

      - name: Restore sysroot cache
        uses: actions/cache/restore@v4
        with:
          path: /opt/freebsd-sysroot
          key: freebsd-sysroot-${{ env.FBSD_VERSION }}-${{ github.run_id }}

      - name: Write recipe
        run: |
          mkdir -p recipe
          cat > recipe/recipe.yaml << 'EOF'
          context:
            version: "0.8.0"
            target: "x86_64-pc-freebsd14.4"
            sysroot: "/opt/freebsd-sysroot/x86_64-pc-freebsd14.4"

          package:
            name: yaml-cpp
            version: ${{ context.version }}

          source:
            url: https://github.com/jbeder/yaml-cpp/archive/refs/tags/${{ context.version }}.tar.gz

          build:
            number: 0
            target_platform: freebsd-64
            script:
              - mkdir build && cd build
              - >
                cmake ..
                -GNinja
                -DCMAKE_BUILD_TYPE=Release
                -DCMAKE_INSTALL_PREFIX=$PREFIX
                -DCMAKE_C_COMPILER=clang
                -DCMAKE_CXX_COMPILER=clang++
                -DCMAKE_C_COMPILER_TARGET=${{ context.target }}
                -DCMAKE_CXX_COMPILER_TARGET=${{ context.target }}
                -DCMAKE_SYSROOT=${{ context.sysroot }}
                -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld"
                -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld"
                -DYAML_CPP_BUILD_TESTS=OFF
                -DYAML_CPP_BUILD_TOOLS=OFF
                -DBUILD_SHARED_LIBS=ON
              - ninja install

          about:
            homepage: https://github.com/jbeder/yaml-cpp
            license: MIT
            summary: YAML parser and emitter in C++ (freebsd-64 cross-compiled)
          EOF

      - name: Build yaml-cpp
        run: |
          rattler-build build \
            --recipe recipe/recipe.yaml \
            --output-dir conda-bld \
            --target-platform freebsd-64

      - uses: actions/upload-artifact@v4
        with:
          name: conda-freebsd-yaml-cpp
          path: conda-bld/**/*.conda

  build-simdjson:
    needs: setup-env
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang lld llvm cmake ninja-build curl
          curl -fsSL \
            "https://github.com/prefix-dev/rattler-build/releases/download/v${RATTLER_BUILD_VERSION}/rattler-build-x86_64-unknown-linux-musl" \
            -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build

      - name: Restore sysroot cache
        uses: actions/cache/restore@v4
        with:
          path: /opt/freebsd-sysroot
          key: freebsd-sysroot-${{ env.FBSD_VERSION }}-${{ github.run_id }}

      - name: Write recipe
        run: |
          mkdir -p recipe
          cat > recipe/recipe.yaml << 'EOF'
          context:
            version: "3.9.4"
            target: "x86_64-pc-freebsd14.4"
            sysroot: "/opt/freebsd-sysroot/x86_64-pc-freebsd14.4"

          package:
            name: simdjson
            version: ${{ context.version }}

          source:
            url: https://github.com/simdjson/simdjson/archive/refs/tags/v${{ context.version }}.tar.gz

          build:
            number: 0
            target_platform: freebsd-64
            script:
              - mkdir build && cd build
              - >
                cmake ..
                -GNinja
                -DCMAKE_BUILD_TYPE=Release
                -DCMAKE_INSTALL_PREFIX=$PREFIX
                -DCMAKE_C_COMPILER=clang
                -DCMAKE_CXX_COMPILER=clang++
                -DCMAKE_C_COMPILER_TARGET=${{ context.target }}
                -DCMAKE_CXX_COMPILER_TARGET=${{ context.target }}
                -DCMAKE_SYSROOT=${{ context.sysroot }}
                -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld"
                -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld"
                -DSIMDJSON_BUILD_STATIC=OFF
                -DSIMDJSON_JUST_LIBRARY=ON
              - ninja install

          about:
            homepage: https://simdjson.org
            license: Apache-2.0
            summary: Parsing gigabytes of JSON per second (freebsd-64 cross-compiled)
          EOF

      - name: Build simdjson
        run: |
          rattler-build build \
            --recipe recipe/recipe.yaml \
            --output-dir conda-bld \
            --target-platform freebsd-64

      - uses: actions/upload-artifact@v4
        with:
          name: conda-freebsd-simdjson
          path: conda-bld/**/*.conda

  build-libsolv:
    needs: setup-env
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang lld llvm cmake ninja-build curl \
            libzstd-dev zlib1g-dev libbz2-dev
          curl -fsSL \
            "https://github.com/prefix-dev/rattler-build/releases/download/v${RATTLER_BUILD_VERSION}/rattler-build-x86_64-unknown-linux-musl" \
            -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build

      - name: Restore sysroot cache
        uses: actions/cache/restore@v4
        with:
          path: /opt/freebsd-sysroot
          key: freebsd-sysroot-${{ env.FBSD_VERSION }}-${{ github.run_id }}

      - name: Write recipe
        run: |
          mkdir -p recipe
          cat > recipe/recipe.yaml << 'EOF'
          context:
            version: "0.7.31"
            target: "x86_64-pc-freebsd14.4"
            sysroot: "/opt/freebsd-sysroot/x86_64-pc-freebsd14.4"

          package:
            name: libsolv
            version: ${{ context.version }}

          source:
            url: https://github.com/openSUSE/libsolv/archive/refs/tags/${{ context.version }}.tar.gz

          build:
            number: 0
            target_platform: freebsd-64
            script:
              - mkdir build && cd build
              - >
                cmake ..
                -GNinja
                -DCMAKE_BUILD_TYPE=Release
                -DCMAKE_INSTALL_PREFIX=$PREFIX
                -DCMAKE_C_COMPILER=clang
                -DCMAKE_CXX_COMPILER=clang++
                -DCMAKE_C_COMPILER_TARGET=${{ context.target }}
                -DCMAKE_CXX_COMPILER_TARGET=${{ context.target }}
                -DCMAKE_SYSROOT=${{ context.sysroot }}
                -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld"
                -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld"
                -DENABLE_CONDA=ON
                -DENABLE_ZSTD_COMPRESSION=ON
                -DENABLE_BZIP2_COMPRESSION=ON
                -DENABLE_ZLIB_COMPRESSION=ON
                -DWITH_LIBXML2=OFF
                -DDISABLE_SHARED=OFF
                -DENABLE_STATIC=OFF
              - ninja install
              # Verify conda headers were installed
              - test -f $PREFIX/include/solv/conda.h || (echo "MISSING conda.h" && exit 1)
              - test -f $PREFIX/include/solv/repo_conda.h || (echo "MISSING repo_conda.h" && exit 1)
              - echo "libsolv conda headers: OK"

          about:
            homepage: https://github.com/openSUSE/libsolv
            license: BSD-2-Clause
            summary: Library for package dependency solving with Conda support (freebsd-64)
          EOF

      - name: Build libsolv
        run: |
          rattler-build build \
            --recipe recipe/recipe.yaml \
            --output-dir conda-bld \
            --target-platform freebsd-64

      - uses: actions/upload-artifact@v4
        with:
          name: conda-freebsd-libsolv
          path: conda-bld/**/*.conda

  # ──────────────────────────────────────────────
  # 2. libmamba — depends on all leaf packages
  # ──────────────────────────────────────────────
  build-libmamba:
    needs: [build-fmt, build-reproc, build-yaml-cpp, build-simdjson, build-libsolv]
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang lld llvm cmake ninja-build curl \
            libzstd-dev zlib1g-dev libbz2-dev libcurl4-openssl-dev \
            libarchive-dev libssl-dev
          curl -fsSL \
            "https://github.com/prefix-dev/rattler-build/releases/download/v${RATTLER_BUILD_VERSION}/rattler-build-x86_64-unknown-linux-musl" \
            -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build

      - name: Restore sysroot cache
        uses: actions/cache/restore@v4
        with:
          path: /opt/freebsd-sysroot
          key: freebsd-sysroot-${{ env.FBSD_VERSION }}-${{ github.run_id }}

      - name: Download leaf package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: conda-freebsd-*
          path: local-channel/freebsd-64/
          merge-multiple: true

      - name: Index local channel
        run: |
          pip install conda-index --quiet
          python -m conda_index local-channel/

      - name: Write libmamba recipe
        run: |
          mkdir -p recipe
          cat > recipe/recipe.yaml << 'EOF'
          context:
            version: "2.1.0"
            target: "x86_64-pc-freebsd14.4"
            sysroot: "/opt/freebsd-sysroot/x86_64-pc-freebsd14.4"

          package:
            name: libmamba
            version: ${{ context.version }}

          source:
            url: https://github.com/mamba-org/mamba/archive/refs/tags/libmamba-${{ context.version }}.tar.gz

          build:
            number: 0
            target_platform: freebsd-64
            script:
              - mkdir build && cd build
              - >
                cmake ..
                -GNinja
                -DCMAKE_BUILD_TYPE=Release
                -DCMAKE_INSTALL_PREFIX=$PREFIX
                -DCMAKE_C_COMPILER=clang
                -DCMAKE_CXX_COMPILER=clang++
                -DCMAKE_C_COMPILER_TARGET=${{ context.target }}
                -DCMAKE_CXX_COMPILER_TARGET=${{ context.target }}
                -DCMAKE_SYSROOT=${{ context.sysroot }}
                -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld"
                -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld"
                -DBUILD_LIBMAMBA=ON
                -DBUILD_SHARED=ON
                -DBUILD_STATIC=OFF
                -DBUILD_MICROMAMBA=OFF
                -DBUILD_LIBMAMBAPY=OFF
                -DMAMBA_NO_KEYRING=ON
                -DMAMBA_DISABLE_CURL_MULTI_WAIT=ON
              - ninja libmamba
              - ninja install

          requirements:
            build:
              - fmt
              - reproc
              - yaml-cpp
              - simdjson
              - libsolv

          about:
            homepage: https://github.com/mamba-org/mamba
            license: BSD-3-Clause
            summary: Fast C++ library for managing conda packages (freebsd-64 cross-compiled)
          EOF

      - name: Build libmamba
        run: |
          rattler-build build \
            --recipe recipe/recipe.yaml \
            --output-dir conda-bld \
            --target-platform freebsd-64 \
            -c "file://$(pwd)/local-channel" \
            -c conda-forge

      - uses: actions/upload-artifact@v4
        with:
          name: conda-freebsd-libmamba
          path: conda-bld/**/*.conda

  # ──────────────────────────────────────────────
  # 3. micromamba — static binary
  # ──────────────────────────────────────────────
  build-micromamba:
    needs: build-libmamba
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang lld llvm cmake ninja-build curl \
            libzstd-dev zlib1g-dev libbz2-dev libcurl4-openssl-dev \
            libarchive-dev libssl-dev
          curl -fsSL \
            "https://github.com/prefix-dev/rattler-build/releases/download/v${RATTLER_BUILD_VERSION}/rattler-build-x86_64-unknown-linux-musl" \
            -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build

      - name: Restore sysroot cache
        uses: actions/cache/restore@v4
        with:
          path: /opt/freebsd-sysroot
          key: freebsd-sysroot-${{ env.FBSD_VERSION }}-${{ github.run_id }}

      - name: Download all freebsd conda artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: conda-freebsd-*
          path: local-channel/freebsd-64/
          merge-multiple: true

      - name: Index local channel
        run: |
          pip install conda-index --quiet
          python -m conda_index local-channel/

      - name: Write micromamba recipe
        run: |
          mkdir -p recipe
          cat > recipe/recipe.yaml << 'EOF'
          context:
            version: "2.1.0"
            target: "x86_64-pc-freebsd14.4"
            sysroot: "/opt/freebsd-sysroot/x86_64-pc-freebsd14.4"

          package:
            name: micromamba
            version: ${{ context.version }}

          source:
            url: https://github.com/mamba-org/mamba/archive/refs/tags/libmamba-${{ context.version }}.tar.gz

          build:
            number: 0
            target_platform: freebsd-64
            script:
              - mkdir build && cd build
              - >
                cmake ..
                -GNinja
                -DCMAKE_BUILD_TYPE=Release
                -DCMAKE_INSTALL_PREFIX=$PREFIX
                -DCMAKE_C_COMPILER=clang
                -DCMAKE_CXX_COMPILER=clang++
                -DCMAKE_C_COMPILER_TARGET=${{ context.target }}
                -DCMAKE_CXX_COMPILER_TARGET=${{ context.target }}
                -DCMAKE_SYSROOT=${{ context.sysroot }}
                -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld -static"
                -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld"
                -DBUILD_LIBMAMBA=ON
                -DBUILD_STATIC=ON
                -DBUILD_SHARED=OFF
                -DBUILD_MICROMAMBA=ON
                -DBUILD_LIBMAMBAPY=OFF
                -DMICROMAMBA_LINKAGE=STATIC
                -DMAMBA_NO_KEYRING=ON
                -DMAMBA_DISABLE_CURL_MULTI_WAIT=ON
              - ninja micromamba
              - install -Dm755 src/micromamba/micromamba $PREFIX/bin/micromamba
              # Verify the binary targets FreeBSD
              - file $PREFIX/bin/micromamba
              - >
                file $PREFIX/bin/micromamba | grep -qi "freebsd"
                || (echo "ERROR: micromamba is not a FreeBSD ELF" && exit 1)
              - echo "micromamba ELF check: PASSED"

          requirements:
            build:
              - fmt
              - reproc
              - yaml-cpp
              - simdjson
              - libsolv

          about:
            homepage: https://github.com/mamba-org/mamba
            license: BSD-3-Clause
            summary: Fast cross-platform package manager — static FreeBSD binary (freebsd-64)
          EOF

      - name: Build micromamba static binary
        run: |
          rattler-build build \
            --recipe recipe/recipe.yaml \
            --output-dir conda-bld \
            --target-platform freebsd-64 \
            -c "file://$(pwd)/local-channel" \
            -c conda-forge

      - name: Extract binary for runtime test
        run: |
          PKG=$(find conda-bld -name 'micromamba*.conda' | head -1)
          mkdir -p binary-out
          cd binary-out
          # .conda is a zip; extract the pkg tarball inside it
          unzip -p "../$PKG" pkg-*.tar.zst | zstd -d | tar -x --wildcards '*/bin/micromamba'
          find . -name micromamba -exec cp {} ./micromamba \;
          chmod +x micromamba
          echo "Extracted binary:"
          ls -lh micromamba

      - uses: actions/upload-artifact@v4
        with:
          name: micromamba-freebsd-binary
          path: binary-out/micromamba

      - uses: actions/upload-artifact@v4
        with:
          name: conda-freebsd-micromamba
          path: conda-bld/**/*.conda

  # ──────────────────────────────────────────────
  # 4. Runtime smoke test inside real FreeBSD VM
  # ──────────────────────────────────────────────
  runtime-test:
    needs: build-micromamba
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: micromamba-freebsd-binary
          path: ./

      - name: Run micromamba inside FreeBSD 14.4 VM
        uses: cross-platform-actions/action@v0.25.0
        with:
          operating_system: freebsd
          version: "14.4"
          run: |
            chmod +x micromamba
            ./micromamba --version \
              && echo "RUNTIME TEST: micromamba --version PASSED" \
              || (echo "RUNTIME TEST: FAILED" && exit 1)
            ./micromamba info \
              && echo "RUNTIME TEST: micromamba info PASSED" \
              || echo "WARNING: micromamba info failed (non-fatal)"
