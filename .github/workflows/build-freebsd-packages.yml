name: Build FreeBSD-64 Conda Packages

on:
  workflow_run:
    workflows: ["Build FreeBSD Sysroot"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      fbsd_version:
        description: 'FreeBSD version to target'
        required: false
        default: '14.4'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FBSD_VERSION: "14.4"

jobs:
  build-packages:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools and compilers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang lld llvm cmake ninja-build \
            pkg-config file curl git \
            python3 python3-pip python3-venv \
            zstd unzip make
          sudo ln -sf /usr/bin/make /usr/bin/gmake

      - name: Run farm.py setup and build
        run: |
          python3 farm.py setup
          python3 farm.py build

      - name: Upload Conda Channel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-channel-freebsd-64
          path: conda-channel/

      - name: Upload Standalone Micromamba Binary
        uses: actions/upload-artifact@v4
        with:
          name: micromamba-freebsd-binary
          path: standalone/micromamba-freebsd

  runtime-test:
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: micromamba-freebsd-binary
          path: ./

      - name: Run micromamba inside FreeBSD 14.4 VM
        uses: cross-platform-actions/action@v0.25.0
        with:
          operating_system: freebsd
          version: "14.4"
          run: |
            chmod +x micromamba-freebsd
            ./micromamba-freebsd --version \
              && echo "RUNTIME TEST: micromamba --version PASSED" \
              || (echo "RUNTIME TEST: FAILED" && exit 1)
            ./micromamba-freebsd info \
              && echo "RUNTIME TEST: micromamba info PASSED" \
              || echo "WARNING: micromamba info failed (non-fatal)"
